<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J7Software | Vývoj Android aplikací</title>
    
    <meta name="description" content="J7Software - Přetváříme nápady ve výkonné Android aplikace. Čistý kód, moderní vývoj, důraz na soukromí.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #000712;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #3ddc84; /* Android zelená */
            --panel-bg: rgba(0, 7, 18, 0.4); 
            --panel-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            perspective: 1500px;
            position: relative;
        }

        /* --- Pozadí --- */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -3;
            pointer-events: none;
            filter: blur(2px) brightness(0.5); 
            background-image: url('wallpaper.png'); 
        }

        @media (max-width: 768px) {
            body::before {
                background-image: url('wallpaper_mobile.png');
                filter: blur(1px) brightness(0.4); 
            }
        }

        #matrix-canvas {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            opacity: 0.12;
            pointer-events: none;
        }

        /* --- 3D Kontejner --- */
        #tilt-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.15s ease-out;
            transform-style: preserve-3d;
            padding: 2rem;
            z-index: 2;
            margin: auto;
        }

        main {
            background-color: var(--panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--panel-border);
            border-radius: 30px;
            padding: 4rem;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            position: relative;
            transform: translateZ(50px);
        }

        .brand-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        /* --- NOVÉ LOGO S EFEKTEM ZÁŘE --- */
        .brand-logo {
            height: 70px;
            width: auto;
            opacity: 0.85;
            object-fit: contain;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 0px rgba(61, 220, 132, 0));
            -webkit-tap-highlight-color: transparent;
        }

        /* Rozzáření při najetí myší (PC) */
        .brand-logo:hover {
            opacity: 1;
            filter: drop-shadow(0 0 15px rgba(61, 220, 132, 0.7));
            transform: scale(1.05);
        }

        /* Rozzáření při kliknutí/tapnutí (Mobil i PC) */
        .brand-logo:active {
            opacity: 1;
            filter: drop-shadow(0 0 25px rgba(61, 220, 132, 1));
            transform: scale(0.95);
            transition: all 0.1s ease;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p.subtitle {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            color: var(--text-muted);
            font-weight: 400;
            max-width: 530px;
            margin-bottom: 3rem;
            line-height: 1.5;
            transition: color 0.4s ease, text-shadow 0.4s ease;
            cursor: default;
            user-select: none;
        }

        main:hover p.subtitle {
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(61, 220, 132, 0.5), 0 0 20px rgba(61, 220, 132, 0.2);
        }

        .cta-button {
            background: rgba(61, 220, 132, 0.1);
            border: 1px solid rgba(61, 220, 132, 0.3);
            color: var(--accent);
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(61, 220, 132, 0.1);
        }

        .cta-button:hover {
            background: rgba(61, 220, 132, 0.2);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(61, 220, 132, 0.2);
        }

        .satellites {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
            transform-style: preserve-3d;
        }

        .sat {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(3px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            animation: float 18s ease-in-out infinite;
            user-select: none;
        }

        .sat-1 { width: 100px; height: 100px; top: -50px; left: 5%; transform: translateZ(-100px); }
        .sat-2 { width: 80px; height: 120px; bottom: 10%; right: 2%; animation-delay: -4s; transform: translateZ(-50px); }
        .sat-3 { width: 60px; height: 60px; top: 15%; right: 8%; animation-delay: -9s; border-color: rgba(61, 220, 132, 0.1); transform: translateZ(80px); }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }

        footer {
            padding: 2rem;
            width: 100%;
            text-align: center;
            z-index: 3;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        footer a, footer .contact-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s ease;
            opacity: 0.7;
        }

        footer a:hover { color: var(--text-main); opacity: 1; }

        @media (max-width: 768px) {
            body { perspective: none; }
            #tilt-container { transform: none !important; padding: 1rem; margin-top: 2rem;}
            main { padding: 3rem 1.5rem; border-radius: 20px; }
            .brand-logo { height: 50px; }
            h1 { font-size: 3rem; }
            p.subtitle { margin-bottom: 2.5rem; }
            .satellites { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div id="tilt-container">
        <div class="satellites">
            <div class="sat sat-1"></div>
            <div class="sat sat-2"></div>
            <div class="sat sat-3"></div>
        </div>

        <main>
            <div class="brand-container">
                <img src="android.png" alt="J7Software Android Logo" class="brand-logo">
                <h1>J7Software</h1>
            </div>
            
            <p class="subtitle">Přetváříme nápady ve výkonné Android aplikace. Žádné šablony, žádný zbytečný kód. Jen moderní vývoj, co funguje.</p>
            
            <a href="#" class="cta-button" id="contact-trigger">Napište nám</a>
        </main>
    </div>

    <footer>
        <a href="privacy.html">Ochrana osobních údajů</a>
        <span class="contact-link" id="email-coder">Kontakt: j7software [zavináč] post.cz</span>
    </footer>

    <script>
        // Matrix Rain
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        const fontSize = 16;
        let columns = 0;
        let drops = [];

        function initMatrix() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = Math.floor(canvas.width / fontSize);
            drops = Array(columns).fill(1).map(() => Math.floor(Math.random() * canvas.height / fontSize));
        }
        
        window.addEventListener('resize', initMatrix);
        initMatrix();

        const characters = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const charArray = characters.split('');

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 7, 18, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#3ddc84";
            ctx.font = fontSize + "px 'Inter', monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = charArray[Math.floor(Math.random() * charArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
            requestAnimationFrame(drawMatrix);
        }
        requestAnimationFrame(drawMatrix);

        // 3D Tilt Effect
        const container = document.getElementById('tilt-container');
        if (window.innerWidth > 768) { 
            document.body.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });
            document.body.addEventListener('mouseleave', () => {
                container.style.transform = 'rotateY(0deg) rotateX(0deg)';
            });
        }

        // Email Protection
        (function() {
            const u = "j7software", d = "post.cz";
            const email = `${u}@${d}`;
            const footerEmail = document.getElementById('email-coder');
            footerEmail.innerHTML = `Kontakt: <a href="mailto:${email}">${email}</a>`;
            document.getElementById('contact-trigger').addEventListener('click', (e) => {
                e.preventDefault();
                window.location.href = `mailto:${email}`;
            });
        })();
    </script>

</body>
</html>
