<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J7Software | Vývoj Android aplikací</title>
    
    <meta name="description" content="J7Software - Přetváříme nápady ve výkonné Android aplikace. Čistý kód, moderní vývoj, důraz na soukromí.">

    <!-- Favicon konfigurace pro všechna zařízení -->
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #000712;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #3ddc84;
            --panel-bg: rgba(0, 7, 18, 0.6); 
            --panel-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            perspective: 1200px;
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -3;
            pointer-events: none;
            filter: blur(2px) brightness(0.5); 
            background-image: url('wallpaper.png'); 
        }

        @media (max-width: 768px) {
            body::before {
                background-image: url('wallpaper_mobile.png');
                filter: blur(1px) brightness(0.4); 
            }
        }

        #matrix-canvas {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            opacity: 0.12;
            pointer-events: none;
        }

        #tilt-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.2s ease-out;
            transform-style: preserve-3d;
            padding: 2rem;
            z-index: 2;
            margin: auto;
            will-change: transform;
        }

        main {
            background-color: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            border-radius: 30px;
            padding: 4rem;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            position: relative;
            backface-visibility: hidden;
            transform: translateZ(1px);
        }

        .brand-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            transform: translateZ(20px);
        }

        .brand-logo {
            height: 70px;
            width: auto;
            opacity: 0.9;
            object-fit: contain;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 0px rgba(61, 220, 132, 0));
            -webkit-tap-highlight-color: transparent;
        }

        .brand-logo:hover {
            opacity: 1;
            filter: drop-shadow(0 0 15px rgba(61, 220, 132, 0.5));
            transform: scale(1.05);
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff 40%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            -webkit-box-decoration-break: clone;
        }

        p.subtitle {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            color: var(--text-muted);
            font-weight: 400;
            max-width: 530px;
            margin-bottom: 3rem;
            line-height: 1.6;
            transition: color 0.4s ease;
            cursor: default;
            user-select: none;
            transform: translateZ(10px);
        }

        main:hover p.subtitle {
            color: var(--text-main);
        }

        .cta-button {
            background: rgba(61, 220, 132, 0.1);
            border: 1px solid rgba(61, 220, 132, 0.4);
            color: var(--accent);
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(61, 220, 132, 0.1);
            transform: translateZ(25px);
        }

        .cta-button:hover {
            background: rgba(61, 220, 132, 0.2);
            transform: translateZ(35px) translateY(-3px);
            box-shadow: 0 8px 25px rgba(61, 220, 132, 0.2);
        }

        .satellites {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
            transform-style: preserve-3d;
        }

        .sat {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            animation: float 18s ease-in-out infinite;
        }

        .sat-1 { width: 100px; height: 100px; top: -50px; left: 5%; transform: translateZ(-80px); }
        .sat-2 { width: 80px; height: 120px; bottom: 10%; right: 2%; animation-delay: -4s; transform: translateZ(-40px); }
        .sat-3 { width: 60px; height: 60px; top: 15%; right: 8%; animation-delay: -9s; border-color: rgba(61, 220, 132, 0.1); transform: translateZ(40px); }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }

        .apps-section {
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
            transform: translateZ(15px);
        }

        .apps-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
        }

        .app-card {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 0.85rem 1.5rem;
            text-decoration: none;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 400px;
        }

        .app-card:hover {
            background: rgba(61, 220, 132, 0.08);
            border-color: rgba(61, 220, 132, 0.3);
            transform: translateY(-2px);
        }

        .app-card img {
            height: 40px; width: 40px;
            border-radius: 10px;
            object-fit: cover;
        }

        .app-card-name {
            color: var(--text-main);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .app-card-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: left;
        }

        footer {
            padding: 3rem 2rem;
            width: 100%;
            text-align: center;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        footer a, footer .contact-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        footer a:hover { color: var(--accent); }

        @media (max-width: 768px) {
            body { perspective: none; }
            #tilt-container { transform: none !important; padding: 1rem; margin-top: 1rem;}
            main { 
                padding: 2.5rem 1.5rem; 
                border-radius: 24px; 
                backdrop-filter: blur(8px);
            }
            .brand-logo { height: 55px; }
            h1 { font-size: 2.8rem; }
            .satellites { display: none; }
            .app-card-desc { display: none; }
            .app-card { justify-content: center; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div id="tilt-container">
        <div class="satellites">
            <div class="sat sat-1"></div>
            <div class="sat sat-2"></div>
            <div class="sat sat-3"></div>
        </div>

        <main>
            <div class="brand-container">
                <img src="android.png" alt="J7Software Android Logo" class="brand-logo">
                <h1>J7Software</h1>
            </div>
            
            <p class="subtitle">Přetváříme nápady ve výkonné Android aplikace. Moderní vývoj s důrazem na čistotu a soukromí.</p>
            
            <a href="#" class="cta-button" id="contact-trigger">Napište nám</a>

            <div class="apps-section">
                <p class="apps-label">Naše aplikace</p>
                
                <a href="https://play.google.com/store/apps/details?id=com.j7software.emailapp"
                   target="_blank"
                   class="app-card">
                    <img src="logo.png" alt="TchikiMail">
                    <span class="app-card-name">TchikiMail</span>
                    <span class="app-card-desc">— Emailový klient</span>
                </a>

                <a href="#" target="_blank" class="app-card">
                    <img src="rave.png" alt="Raven File Manager">
                    <span class="app-card-name">Raven Manager</span>
                    <span class="app-card-desc">— Správce souborů</span>
                </a>
            </div>
        </main>
    </div>

    <footer>
        <div class="footer-links">
            <a href="privacy.html">Soukromí: TchikiMail</a>
            <a href="raven-privacy.html">Soukromí: Raven</a>
        </div>
        <span class="contact-link" id="email-coder">Načítání kontaktu...</span>
    </footer>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        const fontSize = 16;
        let columns = 0;
        let drops = [];

        function initMatrix() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = Math.floor(canvas.width / fontSize);
            drops = Array(columns).fill(1).map(() => Math.floor(Math.random() * -100));
        }
        
        window.addEventListener('resize', initMatrix);
        initMatrix();

        const characters = "0101010101";
        const charArray = characters.split('');

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 7, 18, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#3ddc84";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = charArray[Math.floor(Math.random() * charArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
            setTimeout(() => {
                requestAnimationFrame(drawMatrix);
            }, 30);
        }
        drawMatrix();

        const container = document.getElementById('tilt-container');
        if (window.innerWidth > 768) { 
            let request = null;
            document.body.addEventListener('mousemove', (e) => {
                if (request) cancelAnimationFrame(request);
                request = requestAnimationFrame(() => {
                    const xAxis = (window.innerWidth / 2 - e.pageX) / 60;
                    const yAxis = (window.innerHeight / 2 - e.pageY) / 60;
                    container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                });
            });
            document.body.addEventListener('mouseleave', () => {
                container.style.transform = 'rotateY(0deg) rotateX(0deg)';
            });
        }

        (function() {
            const u = "j7software", d = "post.cz";
            const email = `${u}@${d}`;
            const contactBtn = document.getElementById('contact-trigger');
            const footerEmail = document.getElementById('email-coder');

            if (contactBtn) contactBtn.setAttribute('href', 'mailto:' + email);
            if (footerEmail) footerEmail.innerHTML = `Kontakt: <a href="mailto:${email}">${email}</a>`;
        })();
    </script>

</body>
</html>
